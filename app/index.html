<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self';
                   script-src 'self' https://alcdn.msauth.net https://cdn.jsdelivr.net;
                   style-src 'self' https://cdn.jsdelivr.net 'unsafe-inline';
                   font-src https://cdn.jsdelivr.net;
                   connect-src https://login.microsoftonline.com https://graph.microsoft.com;
                   frame-src https://login.microsoftonline.com;">
    <title>Tenant Config Compare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1">🔍 Tenant Config Compare</span>
            <span class="navbar-text small text-body-secondary">
                Read-only · No backend · All data stays in your browser
            </span>
            <a href="https://github.com/t3blake/tenant-config-mgmt" target="_blank" rel="noopener"
               class="btn btn-outline-secondary btn-sm ms-auto me-2" title="Source code on GitHub">
                GitHub
            </a>
            <button class="btn btn-outline-secondary btn-sm" id="settings-btn" title="Settings">
                ⚙️ Settings
            </button>
        </div>
    </nav>

    <div class="container">
        <!-- Setup guide (shown until custom client ID is configured) -->
        <div id="setup-guide" class="d-none"></div>

        <!-- Tenant panels -->
        <div class="row g-4 mb-4">
            <!-- Source tenant -->
            <div class="col-md-6">
                <div id="source-card" class="card tenant-card border-secondary">
                    <div class="card-header bg-transparent">
                        <span>Source Tenant</span>
                    </div>
                    <div class="card-body">
                        <div id="source-auth">
                            <button class="btn btn-primary w-100" disabled>
                                Sign in to Source Tenant
                            </button>
                        </div>
                        <div id="source-error" class="alert alert-danger error-banner mt-3 d-none"></div>
                        <div id="source-content" class="d-none"></div>
                    </div>
                </div>
            </div>

            <!-- Destination tenant -->
            <div class="col-md-6">
                <div id="dest-card" class="card tenant-card border-secondary">
                    <div class="card-header bg-transparent">
                        <span>Destination Tenant</span>
                    </div>
                    <div class="card-body">
                        <div id="dest-auth">
                            <button class="btn btn-warning w-100" disabled>
                                Sign in to Destination Tenant
                            </button>
                        </div>
                        <div id="dest-error" class="alert alert-danger error-banner mt-3 d-none"></div>
                        <div id="dest-content" class="d-none"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Compare section -->
        <div id="compare-section" class="text-center mb-4">
            <button id="compare-btn" class="btn btn-lg btn-success" disabled
                    title="Sign in to both tenants first">
                Compare Snapshots
            </button>
            <p class="text-body-secondary mt-2 small">
                Select a snapshot from each tenant, then compare.
            </p>
        </div>

        <!-- Diff output (Sprint 2) -->
        <div id="diff-section" class="d-none">
            <div class="card">
                <div class="card-header">
                    <strong>Comparison Results</strong>
                </div>
                <div id="diff-output" class="card-body">
                    <!-- Populated by diff.js in Sprint 2 -->
                </div>
            </div>
        </div>
    </div>



    <!-- Scripts: order matters (config → auth → graph → ui → MSAL bootstrap) -->
    <script src="https://alcdn.msauth.net/browser/2.28.1/js/msal-browser.min.js"
            crossorigin="anonymous"></script>
    <script src="config.js"></script>
    <script src="auth.js"></script>
    <script src="graph.js"></script>
    <script src="snapshot.js"></script>
    <script src="diff.js"></script>
    <script src="ui.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            crossorigin="anonymous"></script>
    <script src="main.js"></script>
</body>
</html>
